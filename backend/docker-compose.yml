version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: attendance-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: attendance_db
      MYSQL_ROOT_PASSWORD: Waxbz12593q123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: attendance-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance-django
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
      - DB_HOST=mysql
      - DB_NAME=attendance_db
      - DB_USER=root
      - DB_PASSWORD=Waxbz12593q123
      - REDIS_HOST=redis
      - FACE_SERVICE_URL=http://face-service:8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  face-service:
    build:
      context: ./face-service
      dockerfile: Dockerfile
    container_name: attendance-face
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - FACE_SERVICE_API_KEY=dev-api-key
    volumes:
      - face_models:/app/model_weights
    # GPU support (uncomment when GPU available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  nginx:
    image: nginx:alpine
    container_name: attendance-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - django

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
  face_models:
